services:
  # Intake engine — sole entry point for all knowledge operations
  intake-engine:
    build:
      context: ../intake-engine
      dockerfile: Dockerfile
    container_name: intake-engine
    ports:
      - "127.0.0.1:8001:8001"
    env_file: .env
    environment:
      - BACKEND=graph-engine
      - COGNEE_URL=http://graph-engine:8000
      - DATA_DIR=/app/data
      - PROMPTS_DIR=/app/channels
      - INTAKE_PORT=8001
    volumes:
      - ../channels:/app/channels:cached
      - ../data:/app/data:cached
    depends_on:
      graph-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - sm-network

  # Graph engine — Rust knowledge graph with Neo4j + Postgres
  graph-engine:
    build:
      context: ../graph-engine
      dockerfile: Dockerfile
    container_name: graph-engine
    env_file: .env
    environment:
      - GRAPH_BACKEND=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-secondmind}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - EMBEDDING_ENDPOINT=http://ollama:11434/api/embed
      - EMBEDDING_MODEL=qwen3-embedding:4b
      - PORT=8000
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    restart: unless-stopped
    networks:
      - sm-network

  # Neo4j — graph database for entities and relationships
  neo4j:
    image: neo4j:5.26-community
    container_name: sm-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-secondmind}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
    networks:
      - sm-network

  # Postgres + pgvector — vectors, cache, metadata
  postgres:
    image: pgvector/pgvector:pg17
    container_name: sm-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - sm-network

  # Ollama — local embedding model
  ollama:
    image: ollama/ollama:latest
    container_name: sm-ollama
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 8G
    networks:
      - sm-network

  # --- Optional: Cognee (for comparison) ---
  # Start with: docker compose --profile cognee up -d
  cognee-backend:
    profiles: ["cognee"]
    image: cognee/cognee:latest@sha256:3093eddf6dff072e6d5ff0ecfa65913a42575e89122e29ecb05cd9dfcd7adc91
    container_name: cognee-backend
    ports:
      - "127.0.0.1:8002:8000"
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - ENVIRONMENT=local
      - LOG_LEVEL=INFO
      - DB_PROVIDER=postgres
      - DB_HOST=cognee-postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}_cognee
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - GRAPH_DATABASE_PROVIDER=kuzu
      - VECTOR_DB_PROVIDER=lancedb
      - COGNEE_SKIP_CONNECTION_TEST=true
      - EMBEDDING_ENDPOINT=http://ollama:11434/api/embed
    volumes:
      - cognee-data:/app/data
      - ./patches/anthropic_adapter.py:/app/cognee/infrastructure/llm/structured_output_framework/litellm_instructor/llm/anthropic/adapter.py:ro
    depends_on:
      cognee-postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3G
    networks:
      - sm-network

  cognee-postgres:
    profiles: ["cognee"]
    image: pgvector/pgvector:pg17
    container_name: cognee-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}_cognee
    volumes:
      - cognee-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    networks:
      - sm-network

volumes:
  pg-data:
  neo4j-data:
  ollama-models:
  cognee-data:
  cognee-pgdata:

networks:
  sm-network:
    driver: bridge
